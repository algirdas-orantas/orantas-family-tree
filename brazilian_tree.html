<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orantas Brazilian Branch — Family Tree</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: #1a1a2e; color: #e0e0e0; padding: 20px; min-height: 100vh; }
  h1 { text-align: center; color: #f0c040; font-size: 1.6em; margin-bottom: 4px; }
  .subtitle { text-align: center; color: #888; font-size: 0.85em; margin-bottom: 20px; }
  .legend { display: flex; justify-content: center; gap: 18px; margin-bottom: 20px; flex-wrap: wrap; font-size: 0.8em; }
  .legend span { display: flex; align-items: center; gap: 5px; }
  .legend .dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }

  .tree-section { margin-bottom: 40px; }
  .section-title { color: #f0c040; font-size: 1.15em; border-bottom: 1px solid #333; padding-bottom: 6px; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
  .section-title .flag { font-size: 1.3em; }

  .family-row { display: flex; align-items: flex-start; justify-content: center; gap: 10px; margin-bottom: 6px; flex-wrap: wrap; }
  .connector { display: flex; justify-content: center; margin: 2px 0; color: #555; font-size: 0.9em; }
  .connector.marriage { color: #e06080; }
  .connector.children { color: #50a0d0; }

  .person {
    border-radius: 8px;
    padding: 8px 12px;
    min-width: 160px;
    max-width: 260px;
    text-align: center;
    position: relative;
    font-size: 0.82em;
    line-height: 1.35;
  }
  .person .name { font-weight: 700; font-size: 1.05em; margin-bottom: 2px; }
  .person .dates { color: #aaa; font-size: 0.9em; }
  .person .place { color: #888; font-size: 0.8em; font-style: italic; }
  .person .detail { color: #999; font-size: 0.78em; margin-top: 3px; }
  .person .tag { display: inline-block; font-size: 0.7em; padding: 1px 6px; border-radius: 3px; margin-top: 3px; }

  .male { background: #1e3a5f; border: 1.5px solid #3a7bd5; }
  .female { background: #3a1e3f; border: 1.5px solid #a855a0; }
  .unknown { background: #2a2a3a; border: 1.5px solid #666; }
  .deceased-infant { background: #2a1a1a; border: 1.5px solid #884444; opacity: 0.7; }
  .mystery { background: #2a2a1a; border: 1.5px dashed #c0a030; }
  .confirmed { border-width: 2.5px; }

  .tag-emigrant { background: #2d6b2d; color: #8f8; }
  .tag-stayed { background: #4a3a1a; color: #daa; }
  .tag-mystery { background: #5a4a1a; color: #fd0; }
  .tag-half { background: #3a2a4a; color: #c8a8e8; }
  .tag-confirmed { background: #1a4a1a; color: #6d6; }
  .tag-prob { background: #3a3a1a; color: #ee4; }

  .children-block {
    margin-left: 40px;
    border-left: 2px solid #50a0d0;
    padding-left: 16px;
    margin-top: 4px;
    margin-bottom: 12px;
  }
  .children-label { color: #50a0d0; font-size: 0.75em; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .children-grid { display: flex; flex-wrap: wrap; gap: 8px; }

  .question-box {
    background: #2a2a1a;
    border: 1px dashed #c0a030;
    border-radius: 8px;
    padding: 12px 16px;
    margin: 16px auto;
    max-width: 750px;
    font-size: 0.85em;
    color: #daa;
  }
  .question-box .q-title { color: #f0c040; font-weight: 700; margin-bottom: 4px; }

  .discovery-box {
    background: #1a2a1a;
    border: 1px solid #3a6a3a;
    border-radius: 8px;
    padding: 12px 16px;
    margin: 16px auto;
    max-width: 750px;
    font-size: 0.85em;
    color: #8c8;
  }
  .discovery-box .d-title { color: #6d6; font-weight: 700; margin-bottom: 4px; }

  .map-note {
    background: #1a2a1a;
    border: 1px solid #3a6a3a;
    border-radius: 8px;
    padding: 10px 14px;
    margin: 12px auto;
    max-width: 750px;
    font-size: 0.82em;
    color: #8c8;
  }

  .separator { border: none; border-top: 1px solid #333; margin: 30px 0; }
  .stats { text-align: center; color: #666; font-size: 0.75em; margin-top: 20px; }

  .two-col { display: flex; gap: 30px; justify-content: center; flex-wrap: wrap; }
  .col { flex: 1; min-width: 300px; max-width: 450px; }

  .nav-bar { display:flex; justify-content:center; gap:12px; padding:10px; background:#111; border-bottom:1px solid #222; position:sticky; top:0; z-index:100; }
  .nav-bar a { color:#f0c040; text-decoration:none; font-size:0.85em; padding:6px 14px; border:1px solid #333; border-radius:6px; transition:all .2s; }
  .nav-bar a:hover { background:#222; border-color:#f0c040; }
  .nav-bar a.active { background:#2a2a1a; border-color:#f0c040; color:#fff; }
</style>
</

// Password protection вЂ” checked before page renders
(function(){
  const HASH='73d9409934879368178f8d2b55b756be0d48034e6eb8c2ea0629d7fe19b123f8';
  const SESSION_KEY='orantas_auth';
  if(sessionStorage.getItem(SESSION_KEY)==='1')return; // already authenticated this session
  // Hide body until authenticated
  document.addEventListener('DOMContentLoaded',function(){
    document.body.style.display='none';
    const overlay=document.createElement('div');
    overlay.id='auth-overlay';
    overlay.style.cssText='position:fixed;inset:0;background:linear-gradient(160deg,#0d1b2a,#1b2e45);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;font-family:Georgia,serif';
    overlay.innerHTML=`
      <div style="text-align:center;margin-bottom:28px">
        <div style="font-size:2.2rem;color:#e8b96a;letter-spacing:3px;text-shadow:0 2px 12px rgba(0,0,0,.6)">ORANTAS</div>
        <div style="color:#7a95a8;font-size:.82rem;margin-top:6px;letter-spacing:2px">FAMILY HERITAGE В· PRIVATE</div>
      </div>
      <div style="background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:28px 32px;width:320px;max-width:92vw">
        <label style="display:block;font-size:.68rem;color:#7a95a8;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">Enter password to continue</label>
        <input id="auth-pw" type="password" placeholder="Password" autocomplete="current-password"
          style="width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.15);border-radius:7px;color:#e0e0e0;padding:10px 13px;font-size:.95rem;font-family:Georgia,serif;outline:none;box-sizing:border-box"/>
        <div id="auth-err" style="color:#e85b5b;font-size:.75rem;margin-top:7px;min-height:16px"></div>
        <button id="auth-btn" style="margin-top:12px;width:100%;background:rgba(232,185,106,.12);border:1px solid rgba(232,185,106,.5);color:#e8b96a;border-radius:7px;padding:10px;font-size:.9rem;font-family:Georgia,serif;cursor:pointer;letter-spacing:1px">ENTER</button>
      </div>
      <div style="color:#2a4050;font-size:.68rem;margin-top:22px">Orantas Family Tree В· Private Research Archive</div>`;
    document.body.parentNode.insertBefore(overlay,document.body);
    document.body.style.display='';

    async function check(){
      const pw=document.getElementById('auth-pw').value;
      if(!pw)return;
      const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(pw));
      const hex=Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
      if(hex===HASH){
        sessionStorage.setItem(SESSION_KEY,'1');
        overlay.style.transition='opacity .4s';
        overlay.style.opacity='0';
        setTimeout(()=>overlay.remove(),420);
      } else {
        document.getElementById('auth-err').textContent='Incorrect password. Please try again.';
        document.getElementById('auth-pw').value='';
        document.getElementById('auth-pw').focus();
      }
    }
    document.getElementById('auth-btn').addEventListener('click',check);
    document.getElementById('auth-pw').addEventListener('keydown',function(e){if(e.key==='Enter')check();});
    setTimeout(()=>document.getElementById('auth-pw').focus(),100);
  });
})();
